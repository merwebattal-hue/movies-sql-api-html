
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My Movie App</title>
        <style>
            body {
                background-color: #f4f4f4;
                font-family: Arial, sans-serif;
                margin: 0;
                padding: 20px;
            }

            h1 {
                text-align: center;
            }

            .movie-grid {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 20px;
            }

            .movie-card {
                background: white;
                border-radius: 10px;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
                width: 220px;
                padding: 15px;
                text-align: center;
            }

            .movie-card img {
                width: 100%;
                height: auto;
                border-radius: 8px;
            }

            .movie-title {
                font-size: 18px;
                font-weight: bold;
                margin-top: 10px;
            }

            .movie-year,
            .movie-rating {
                margin: 5px 0;
            }
        </style>
    </head>
    <body>
        <h1>My Movie Collection 🎬</h1>
        <div class="movie-grid">
    
        <div class="movie-card">
            <img src="https://m.media-amazon.com/images/M/MV5BYzYyN2FiZmUtYWYzMy00MzViLWJkZTMtOGY1ZjgzNWMwN2YxXkEyXkFqcGc@._V1_SX300.jpg" alt="Titanic poster">
            <div class="movie-title">Titanic</div>
            <div class="movie-year">Year: 1997</div>
            <div class="movie-rating">Rating: 8.0</div>
        </div>
        
        <div class="movie-card">
            <img src="https://m.media-amazon.com/images/M/MV5BMjAxMzY3NjcxNF5BMl5BanBnXkFtZTcwNTI5OTM0Mw@@._V1_SX300.jpg" alt="Inception poster">
            <div class="movie-title">Inception</div>
            <div class="movie-year">Year: 2010</div>
            <div class="movie-rating">Rating: 8.8</div>
        </div>
        
        <div class="movie-card">
            <img src="https://m.media-amazon.com/images/M/MV5BMTMxNTMwODM0NF5BMl5BanBnXkFtZTcwODAyMTk2Mw@@._V1_SX300.jpg" alt="The Dark Knight poster">
            <div class="movie-title">The Dark Knight</div>
            <div class="movie-year">Year: 2008</div>
            <div class="movie-rating">Rating: 9.1</div>
        </div>
        
        <div class="movie-card">
            <img src="https://m.media-amazon.com/images/M/MV5BYTViYTE3ZGQtNDBlMC00ZTAyLTkyODMtZGRiZDg0MjA2YThkXkEyXkFqcGc@._V1_SX300.jpg" alt="Pulp Fiction poster">
            <div class="movie-title">Pulp Fiction</div>
            <div class="movie-year">Year: 1994</div>
            <div class="movie-rating">Rating: 8.8</div>
        </div>
        
        </div>
    </body>
    </html>
